name: Deploy
description: Deploy a Cloudflare Worker via wrangler.

inputs:
  config:
    description: Path to wrangler.toml or wrangler.jsonc
    required: true

outputs:
  deployed:
    description: Whether the deployment succeeded
    value: ${{ steps.deploy.outputs.deployed }}

runs:
  using: composite
  steps:
    - name: Deploy
      id: deploy
      shell: bash
      run: |
        set +e
        npx wrangler deploy --config "${{ inputs.config }}"
        EXIT=$?

        if [[ $EXIT -eq 0 ]]; then
          echo "deployed=true" >> "$GITHUB_OUTPUT"
        else
          echo "deployed=false" >> "$GITHUB_OUTPUT"
        fi
        exit $EXIT

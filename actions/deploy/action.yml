name: deploy
description: Deploy a Cloudflare worker and optionally set environment variables.

inputs:
  variable_keys:
    description: JSON array of variable names to fetch from Oboist and inject into wrangler.toml
    required: false
    default: ""
  proxy_url:
    description: Oboist base URL
    required: true
  proxy_token:
    description: Oboist bearer token
    required: true
  cloudflare_token:
    description: Cloudflare API token
    required: true
  cloudflare_account_id:
    description: Cloudflare account ID
    required: true

outputs:
  deployed:
    description: Whether the deployment succeeded
    value: ${{ steps.deploy.outputs.deployed }}

runs:
  using: composite
  steps:
    - name: Fetch variables
      id: fetch-vars
      if: ${{ inputs.variable_keys != '' && inputs.variable_keys != '[]' }}
      shell: bash
      env:
        PROXY_URL: ${{ inputs.proxy_url }}
        PROXY_TOKEN: ${{ inputs.proxy_token }}
      run: |
        ARGS=()
        while IFS= read -r name; do
          value=$(curl --silent --show-error --fail-with-body \
            "${PROXY_URL%/}/pit-boss/token?kind=variable&name=${name}" \
            --header "Authorization: Bearer ${PROXY_TOKEN}" \
            | jq -er '.value')
          ARGS+=(--value "${name}:${value}")
        done < <(printf '%s' '${{ inputs.variable_keys }}' | jq -r '.[]')
        echo "args=${ARGS[*]}" >> "$GITHUB_OUTPUT"

    - name: Deploy
      id: deploy
      shell: bash
      env:
        CLOUDFLARE_API_TOKEN: ${{ inputs.cloudflare_token }}
        CLOUDFLARE_ACCOUNT_ID: ${{ inputs.cloudflare_account_id }}
      run: |
        set +e
        ARGS=()
        if [[ -n '${{ steps.fetch-vars.outputs.args }}' ]]; then
          read -ra ARGS <<< '${{ steps.fetch-vars.outputs.args }}'
        fi
        sh "${{ github.action_path }}/../../bin/pit-boss" vars "${ARGS[@]}"
        EXIT=$?
        if [[ $EXIT -eq 0 ]]; then
          echo "deployed=true" >> "$GITHUB_OUTPUT"
        else
          echo "deployed=false" >> "$GITHUB_OUTPUT"
        fi
        exit $EXIT

name: Deploy Secrets
description: Push secrets declared in tokens.yml to the Cloudflare Worker.

inputs:
  config:
    description: Path to wrangler.toml or wrangler.jsonc
    required: false
    default: ""
  tokens:
    description: Path to tokens.yml; defaults to sibling of config
    required: false
    default: ""
  values:
    description: |
      Newline-separated KEY:value pairs supplying secret values declared in tokens.yml.
      Example:
        SLACK_BOT_TOKEN:xoxb-...
        GEOAPIFY_API_KEY:abc123
    required: false
    default: ""
  force:
    description: Skip missing secrets instead of erroring
    required: false
    default: "false"

outputs:
  pushed:
    description: Whether secrets were pushed successfully
    value: ${{ steps.secrets.outputs.pushed }}

runs:
  using: composite
  steps:
    - name: Push secrets
      id: secrets
      shell: bash
      run: |
        set +e

        ARGS=(secrets)

        if [[ -n "${{ inputs.config }}" ]]; then
          ARGS+=(--config "${{ inputs.config }}")
        fi

        if [[ -n "${{ inputs.tokens }}" ]]; then
          ARGS+=(--tokens "${{ inputs.tokens }}")
        fi

        if [[ "${{ inputs.force }}" == "true" ]]; then
          ARGS+=(--force)
        fi

        # Convert newline-separated KEY:value pairs into --value flags
        while IFS= read -r pair; do
          pair="${pair//[$'\r']}"
          [[ -z "$pair" ]] && continue
          ARGS+=(--value "$pair")
        done <<< "${{ inputs.values }}"

        sh "${{ github.action_path }}/../../bin/pit-boss" "${ARGS[@]}"
        EXIT=$?

        if [[ $EXIT -eq 0 ]]; then
          echo "pushed=true" >> "$GITHUB_OUTPUT"
        else
          echo "pushed=false" >> "$GITHUB_OUTPUT"
        fi
        exit $EXIT

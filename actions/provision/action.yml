name: Provision
description: Apply migrations and seeds to a single target in the correct interleaved order.

inputs:
  target:
    description: Database target name
    required: true
  is_production:
    description: Set to 'true' when targeting production; fails fast rather than continuing on error
    required: false
    default: "false"
  provision_dir:
    description: Directory containing provision files (migrations, seeds)
    required: false
    default: provision
  proxy_url:
    description: Oboist base URL
    required: true
  proxy_token:
    description: Oboist bearer token
    required: true

outputs:
  passed:
    description: Whether provisioning succeeded
    value: ${{ steps.provision.outputs.passed }}

runs:
  using: composite
  steps:
    - name: Provision
      id: provision
      shell: bash
      env:
        PROXY_TOKEN: ${{ inputs.proxy_token }}
        PROXY_URL: ${{ inputs.proxy_url }}
      run: |
        set +e
        bash "${{ github.action_path }}/provision.sh" \
          --target "${{ inputs.target }}" \
          --is-production "${{ inputs.is_production }}" \
          --provision-dir "${{ inputs.provision_dir }}"
        EXIT=$?
        if [[ $EXIT -eq 0 ]]; then
          echo "passed=true" >> "$GITHUB_OUTPUT"
        else
          echo "passed=false" >> "$GITHUB_OUTPUT"
        fi
        exit $EXIT

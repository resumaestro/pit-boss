name: secrets-sync
description: Register a worker's required secrets with Oboist. Oboist diffs against the previous list, puts new/changed secrets to the worker, and removes stale ones.

inputs:
  worker:
    description: Cloudflare Worker script name
    required: true
  secret_keys:
    description: JSON array of secret names this worker requires
    required: true
  proxy_url:
    description: Oboist base URL
    required: true
  proxy_token:
    description: Oboist bearer token
    required: true

outputs:
  secret_keys:
    description: JSON array of secret names that were synced
    value: ${{ steps.sync.outputs.secret_keys }}

runs:
  using: composite
  steps:
    - name: Sync secrets
      id: sync
      shell: bash
      env:
        PROXY_URL: ${{ inputs.proxy_url }}
        PROXY_TOKEN: ${{ inputs.proxy_token }}
      run: |
        set +e

        BODY=$(jq -n \
          --arg worker "${{ inputs.worker }}" \
          --argjson secrets '${{ inputs.secret_keys }}' \
          '{ worker: $worker, secrets: $secrets }')

        RESPONSE=$(curl --silent --show-error --fail-with-body \
          --request POST \
          "${PROXY_URL%/}/pit-boss/secrets/sync" \
          --header "Authorization: Bearer ${PROXY_TOKEN}" \
          --header "Content-Type: application/json" \
          --data "$BODY")
        EXIT=$?

        printf '%s\n' "$RESPONSE"

        if [[ $EXIT -eq 0 ]]; then
          echo "secret_keys=${{ inputs.secret_keys }}" >> "$GITHUB_OUTPUT"
        fi
        exit $EXIT

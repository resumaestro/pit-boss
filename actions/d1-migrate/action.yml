name: D1 Migrate
description: Reconcile a Cloudflare D1 database to a target migration version, with sandbox roundtrip testing.

inputs:
  db_name:
    description: Production D1 database name
    required: true
  sandbox_db_name:
    description: Sandbox D1 database name for dry-run testing
    required: true
  config_file:
    description: Path to config.json containing applied_migration_version
    required: false
    default: config.json
  migrations_dir:
    description: Path to directory containing migration files
    required: false
    default: migrations
  snaps_dir:
    description: Path to directory for migration snapshots (should match cache path)
    required: false
    default: .migration-snaps
  cloudflare_api_token:
    description: Cloudflare API token with D1 Edit permission
    required: true
  cloudflare_account_id:
    description: Cloudflare account ID
    required: true

outputs:
  actual:
    description: The migration version currently applied to the DB
    value: ${{ steps.versions.outputs.actual }}
  target:
    description: The target migration version from config.json
    value: ${{ steps.versions.outputs.target }}
  needed:
    description: Whether a migration was needed
    value: ${{ steps.versions.outputs.needed }}
  passed:
    description: Whether the dry-run roundtrip test passed
    value: ${{ steps.run.outputs.passed }}

runs:
  using: composite
  steps:
    - uses: actions/setup-node@v4
      with:
        node-version: 20

    - name: Install wrangler
      shell: bash
      run: npm install -g wrangler

    - name: Read versions
      id: versions
      shell: bash
      env:
        CLOUDFLARE_API_TOKEN: ${{ inputs.cloudflare_api_token }}
        CLOUDFLARE_ACCOUNT_ID: ${{ inputs.cloudflare_account_id }}
      run: |
        TARGET=$(jq -r '.applied_migration_version' "${{ inputs.config_file }}")
        ACTUAL=$(npx wrangler d1 execute "${{ inputs.db_name }}" --remote --json \
          --command "CREATE TABLE IF NOT EXISTS schema_migrations (version INTEGER PRIMARY KEY, applied_at TEXT NOT NULL DEFAULT (datetime('now'))); SELECT COALESCE(MAX(version), 0) AS v FROM schema_migrations;" \
          | jq -r '.[-1].results[0].v // 0')
        echo "actual=$ACTUAL" >> "$GITHUB_OUTPUT"
        echo "target=$TARGET" >> "$GITHUB_OUTPUT"
        if [[ "$TARGET" -eq "$ACTUAL" ]]; then
          echo "needed=false" >> "$GITHUB_OUTPUT"
        else
          echo "needed=true" >> "$GITHUB_OUTPUT"
        fi

    - name: Restore snap cache
      id: snap-cache
      if: steps.versions.outputs.needed == 'true'
      uses: actions/cache@v4
      with:
        path: ${{ inputs.snaps_dir }}
        key: d1-snap-${{ inputs.db_name }}-${{ steps.versions.outputs.actual }}

    - name: Run migration
      id: run
      if: steps.versions.outputs.needed == 'true'
      shell: bash
      env:
        CLOUDFLARE_API_TOKEN: ${{ inputs.cloudflare_api_token }}
        CLOUDFLARE_ACCOUNT_ID: ${{ inputs.cloudflare_account_id }}
      run: |
        set +e
        bash "${{ github.action_path }}/migrate.sh" \
          --db "${{ inputs.db_name }}" \
          --sandbox-db "${{ inputs.sandbox_db_name }}" \
          --config "${{ inputs.config_file }}" \
          --migrations "${{ inputs.migrations_dir }}" \
          --snaps "${{ inputs.snaps_dir }}" \
          --remote
        EXIT=$?
        if [[ $EXIT -eq 0 ]]; then
          echo "passed=true" >> "$GITHUB_OUTPUT"
        else
          echo "passed=false" >> "$GITHUB_OUTPUT"
        fi
        exit 0

    - name: Cache snap of actual (on failure, if not already cached)
      if: steps.versions.outputs.needed == 'true' && steps.run.outputs.passed == 'false' && steps.snap-cache.outputs.cache-hit != 'true'
      uses: actions/cache/save@v4
      with:
        path: ${{ inputs.snaps_dir }}
        key: d1-snap-${{ inputs.db_name }}-${{ steps.versions.outputs.actual }}

    - name: Cache snap of target (on success)
      if: steps.versions.outputs.needed == 'true' && steps.run.outputs.passed == 'true'
      uses: actions/cache/save@v4
      with:
        path: ${{ inputs.snaps_dir }}
        key: d1-snap-${{ inputs.db_name }}-${{ steps.versions.outputs.target }}

name: Fetch Variable
description: Fetch a single named variable from the Oboist variable store.

inputs:
  name:
    description: Name of the variable to fetch (must be registered in Oboist)
    required: true
  proxy_url:
    description: Oboist base URL
    required: true
  proxy_token:
    description: Oboist bearer token
    required: true

outputs:
  value:
    description: The fetched variable value
    value: ${{ steps.fetch.outputs.value }}

runs:
  using: composite
  steps:
    - name: Fetch variable
      id: fetch
      shell: bash
      env:
        PROXY_TOKEN: ${{ inputs.proxy_token }}
        PROXY_URL: ${{ inputs.proxy_url }}
      run: |
        RESPONSE=$(curl \
          --silent \
          --show-error \
          --fail-with-body \
          --request GET \
          "${PROXY_URL%/}/pit-boss/token?kind=variable&name=${{ inputs.name }}" \
          --header "Authorization: Bearer ${PROXY_TOKEN}")

        VALUE=$(printf '%s' "$RESPONSE" | jq -er '.value')
        echo "value=$VALUE" >> "$GITHUB_OUTPUT"
